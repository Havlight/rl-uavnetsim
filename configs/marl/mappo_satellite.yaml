seed: 7

env:
  num_steps: 200
  num_uavs: 2
  num_users: 60
  backhaul_type: satellite
  user_demand_rate_bps: 0.5e6
  orbit_radius_m: 220.0
  user_speed_mean_mps: 2.0
  user_distribution: uniform
  spawn_margin: 0.1
  association_min_rate_bps: 0.5e6

observation:
  preset: compact_v1
  max_obs_users: 15
  obs_radius_m: 500.0

trainer:
  frames_per_batch: 300
  total_frames: 180000
  ppo_epochs: 3
  minibatch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.0
  value_coef: 0.5
  lr: 0.0003
  device: cuda
  checkpoint_interval: 1
  eval_interval: 1

model:
  actor_hidden_dims: [64, 64]
  critic_hidden_dims: [128, 128]
  activation: tanh

eval:
  num_eval_episodes: 1
  deterministic_policy: true

output:
  root_dir: runs
  run_name: mappo_satellite_v1
