seed: 42

env:
  num_steps: 60
  num_uavs: 3
  num_users: 30
  backhaul_type: satellite
  user_demand_rate_bps: 2.0e6
  orbit_radius_m: 600.0
  user_speed_mean_mps: 3.5
  user_distribution: hotspots

observation:
  preset: compact_v1
  max_obs_users: 15
  obs_radius_m: 500.0

trainer:
  frames_per_batch: 300
  total_frames: 14400
  ppo_epochs: 4
  minibatch_size: 128
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.0
  value_coef: 0.5
  lr: 0.0003
  device: cuda
  checkpoint_interval: 2
  eval_interval: 2

model:
  actor_hidden_dims: [128, 128, 128]
  critic_hidden_dims: [256, 256, 256]
  activation: tanh

eval:
  num_eval_episodes: 5
  deterministic_policy: true

output:
  root_dir: runs
  run_name: mappo_satellite_3uav_medium
