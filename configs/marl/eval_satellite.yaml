seed: 17

env:
  num_steps: 30
  num_uavs: 5
  num_users: 60
  backhaul_type: satellite
  demo_mode: default

observation:
  preset: compact_v1
  max_obs_users: 15
  obs_radius_m: 500.0

trainer:
  frames_per_batch: 64
  total_frames: 256
  ppo_epochs: 3
  minibatch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.0
  value_coef: 0.5
  lr: 0.0003
  device: cpu
  checkpoint_interval: 1
  eval_interval: 1

model:
  actor_hidden_dims: [64, 64]
  critic_hidden_dims: [128, 128]
  activation: tanh

eval:
  num_eval_episodes: 2
  deterministic_policy: true

output:
  root_dir: runs/eval_satellite
  run_name: eval_satellite
